name: Fuzz

# Nightly fuzz run against the tset-core parser surface. Each target
# runs for a bounded duration so we don't burn unlimited CI minutes;
# any crash leaks back as a corpus artefact for triage.
#
# Targets:
#   - reader_open       — Reader::open against arbitrary bytes
#   - sections_decode   — TSMT/TLOG/TCOL on-disk binary section parsers
#
# This is a soft gate: a CI run that finds a crash uploads the
# reproducer and fails. Crash-free runs upload the evolved corpus so
# the next night picks up where the previous left off.

on:
  schedule:
    - cron: "37 4 * * *"  # nightly at 04:37 UTC, off-peak
  workflow_dispatch: {}
  pull_request:
    paths:
      - "fuzz/**"
      - "crates/tset-core/src/sections.rs"
      - "crates/tset-core/src/reader.rs"
      - "crates/tset-core/src/manifest.rs"
      - ".github/workflows/fuzz.yml"

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        target: [reader_open, sections_decode]
    steps:
      - uses: actions/checkout@v4
      - name: install nightly + cargo-fuzz
        uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      # Restore the corpus from the prior nightly run so coverage
      # accumulates over time. First run on each branch starts empty.
      - name: restore prior corpus
        uses: actions/cache@v4
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-${{ github.ref_name }}-
            fuzz-corpus-${{ matrix.target }}-main-
      - name: run fuzz target (300s budget)
        # -max_total_time bounds wall-clock; libFuzzer exits 0 on no-crash.
        run: |
          cd fuzz
          cargo +nightly fuzz run ${{ matrix.target }} \
            -- -max_total_time=300 -print_final_stats=1
      - name: upload crash corpus on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes-${{ matrix.target }}-${{ github.run_id }}
          path: |
            fuzz/artifacts/${{ matrix.target }}/
          if-no-files-found: ignore
          retention-days: 30
