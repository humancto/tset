name: release

# Triggered by pushing a `v*` tag (e.g. `v0.3.2`, `v0.4.0`). Workflow:
#
#   1. Sanity check: tag must match crate version in Cargo.toml.
#   2. Publish `tset-core` to crates.io.
#   3. Wait for the crates.io index to surface the new version.
#   4. Publish `tset-cli` and `tset-py` in parallel (both depend on tset-core).
#   5. Build Python wheels via cibuildwheel + an sdist via maturin, upload to PyPI.
#
# Required repo configuration:
#
# - Secret `CARGO_REGISTRY_TOKEN` with crates.io publish scope.
# - On PyPI: enable "Trusted Publishing" for the `tset` project pointing at
#   this workflow. No API token needed; OIDC handles it.
# - Branch/tag protection: only maintainers can push `v*` tags.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (without leading v)"
        required: true

permissions:
  contents: read

jobs:
  # ── Sanity ─────────────────────────────────────────────────────────
  sanity:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Parse version from tag or input
        id: parse
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            v="${GITHUB_REF#refs/tags/v}"
            echo "version=$v" >> "$GITHUB_OUTPUT"
          fi
      - name: Verify version matches Cargo.toml workspace
        run: |
          want="${{ steps.parse.outputs.version }}"
          got=$(grep -E '^version = ' Cargo.toml | head -1 | cut -d'"' -f2)
          if [ "$want" != "$got" ]; then
            echo "::error::tag version $want != Cargo.toml workspace.package.version $got"
            exit 1
          fi

  # ── Publish to crates.io ───────────────────────────────────────────
  crates-core:
    needs: sanity
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish tset-core
        run: cargo publish --manifest-path crates/tset-core/Cargo.toml --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  crates-downstream:
    needs: crates-core
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: [tset-cli, tset-py]
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Wait for tset-core to surface on crates.io index
        run: |
          version="${{ needs.sanity.outputs.version }}"
          for i in $(seq 1 60); do
            if cargo search tset-core --limit 1 2>/dev/null | grep -q "tset-core = \"$version\""; then
              echo "tset-core $version is indexed"
              exit 0
            fi
            echo "waiting for tset-core $version (attempt $i)…"
            sleep 10
          done
          echo "::error::tset-core $version did not appear on crates.io within 10 minutes"
          exit 1
        # The waiter is required because crates.io's index can lag the
        # publish endpoint by ~30 seconds; without it the downstream
        # publishes race and fail.
      - name: Publish ${{ matrix.crate }}
        run: cargo publish --manifest-path crates/${{ matrix.crate }}/Cargo.toml --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── Python wheels via cibuildwheel ─────────────────────────────────
  python-wheels:
    needs: sanity
    name: wheels (${{ matrix.os }} · ${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  arch: x86_64 }
          - { os: ubuntu-latest,  arch: aarch64 }
          - { os: macos-13,       arch: x86_64 }
          - { os: macos-14,       arch: arm64 }
          - { os: windows-latest, arch: AMD64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Set up QEMU (linux aarch64)
        if: matrix.os == 'ubuntu-latest' && matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
      - name: Build wheels
        uses: pypa/cibuildwheel@v2
        with:
          package-dir: python
          output-dir: wheelhouse
        env:
          # We use abi3-py39 on the PyO3 side, so a single wheel works
          # for Python 3.9+. The `py-3.9-abi3` build tag expresses that.
          CIBW_BUILD: "cp39-*"
          CIBW_SKIP: "*-musllinux_i686 pp* *-win32"
          CIBW_ARCHS: ${{ matrix.arch }}
          CIBW_BEFORE_BUILD: |
            pip install maturin
          CIBW_BUILD_FRONTEND: "build[uv]"
          CIBW_ENVIRONMENT_LINUX: |
            PATH=/usr/local/cargo/bin:$PATH
          CIBW_TEST_REQUIRES: "pytest"
          # Smoke test: the wheel imports and a tiny round-trip works.
          CIBW_TEST_COMMAND: "python -c \"import tset; from tset.tokenizers import ByteLevelTokenizer; print(tset.__version__)\""
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: wheelhouse/*.whl

  python-sdist:
    needs: sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install build
      - run: python -m build --sdist --outdir dist python
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  python-publish:
    needs: [python-wheels, python-sdist, crates-downstream]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for PyPI Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish to PyPI (Trusted Publishing / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          # No API token: PyPI's OIDC verifies this workflow against the
          # project's Trusted Publisher configuration.
